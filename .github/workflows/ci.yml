name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  frontend:
    name: Frontend — Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  api:
    name: API — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - working-directory: apps/api
        run: pip install ruff && ruff check .

  sdk-js:
    name: SDK JS — Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/sdk-js/package-lock.json

      - working-directory: packages/sdk-js
        run: npm ci

      - working-directory: packages/sdk-js
        run: npx tsc --noEmit

      - working-directory: packages/sdk-js
        run: npm run build

  sdk-python:
    name: SDK Python — Lint & Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - working-directory: packages/sdk-python
        run: pip install ruff httpx && ruff check liveboard/

      - working-directory: packages/sdk-python
        run: python -c "from liveboard import SDK_VERSION, LiveBoardConfig; print('import OK', SDK_VERSION)"
