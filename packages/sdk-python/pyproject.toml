[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "liveboard-sdk"
version = "0.1.0"
description = "LiveBoard SDK — zero-config API observability for FastAPI, Django, and Flask"
license = { text = "MIT" }
requires-python = ">=3.9"
keywords = ["api", "observability", "monitoring", "fastapi", "django", "flask"]
dependencies = [
  "httpx>=0.27.0",
]

[project.optional-dependencies]
fastapi   = ["fastapi>=0.100.0", "starlette>=0.27.0"]
django    = ["django>=3.2"]
flask     = ["flask>=2.0"]
dev = [
  "pytest>=7.0",
  "pytest-asyncio>=0.23",
  "fastapi>=0.100.0",
  "httpx>=0.27.0",
  "django>=3.2",
  "flask>=2.0",
  "ruff",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["liveboard*"]

[tool.ruff]
line-length = 100
target-version = "py39"
